name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Code auschecken
        uses: actions/checkout@v3

      - name: Docker Image bauen
        run: docker build -t meine-app:latest .

      - name: In Kubernetes deployen
        run: |
          docker save meine-app:latest | sudo k3s ctr images import -
          sudo kubectl rollout restart deployment/meine-app
          sudo kubectl rollout status deployment/meine-app
